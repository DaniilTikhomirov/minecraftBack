services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: minecraft_backend
    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/minecraft
      SPRING_DATASOURCE_USERNAME: telegram
      SPRING_DATASOURCE_PASSWORD: tg123
      SUPER_ADMIN_USERNAME: admin
      SUPER_ADMIN_PASSWORD: admin
      JWT_SECRET_KEY: ReKJZW6VekQl9blL2NSD9PeOmU65d8tq
      REFRESH_SECRET_KEY: 9St9275RBcn2RCucOffCbYDnYjhvt94q

    # Монтируем папку на сервере → внутрь контейнера
    volumes:
      - ./storage:/app/storage

    depends_on:
      db:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s


  db:
    image: postgres:15
    container_name: minecraft_db
    environment:
      POSTGRES_DB: minecraft
      POSTGRES_USER: telegram
      POSTGRES_PASSWORD: tg123
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telegram -d minecraft"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  db_data:
