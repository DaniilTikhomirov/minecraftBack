services:
  backend:
    image: daniltikhomirov/minecraft_backend:latest
    container_name: minecraft_backend
    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL:
      SPRING_DATASOURCE_USERNAME:
      SPRING_DATASOURCE_PASSWORD:
      SUPER_ADMIN_USERNAME:
      SUPER_ADMIN_PASSWORD:
      JWT_SECRET_KEY:
      REFRESH_SECRET_KEY:

    # Монтируем папку на сервере → внутрь контейнера
    volumes:
      - ./storage:/app/storage

    depends_on:
      db:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s


  db:
    image: postgres:15
    container_name: minecraft_db
    environment:
      POSTGRES_DB:
      POSTGRES_USER:
      POSTGRES_PASSWORD:
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telegram -d minecraft"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  db_data:
