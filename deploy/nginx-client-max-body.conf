# Вставь в КАЖДЫЙ server { ... } для api.night-vision.su (и для :80, и для :443 после certbot).
# Иначе nginx отдаёт 413 Request Entity Too Large до Spring Boot — правки только в Java не помогут.
#
# После правки:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Проверить, что директива реально в активном конфиге:
#   sudo nginx -T 2>/dev/null | grep client_max_body_size

client_max_body_size 64m;
